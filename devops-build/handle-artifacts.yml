steps:
  - task: PowerShell@2
    displayName: 'Create plugin zip archive'
    inputs:
      targetType: 'inline'
      script: |
        $source = "$(Build.SourcesDirectory)/dist/*"
        $destination = "$(Build.ArtifactStagingDirectory)/$(pluginId)-$(BuildNumberLong).zip"
        Compress-Archive -Path $source -DestinationPath $destination -Force
        Write-Host "Created archive: $destination"

  - task: PowerShell@2
    displayName: 'Create version info file'
    inputs:
      targetType: 'inline'
      script: |
        New-Item $(Build.ArtifactStagingDirectory)/versioninfo.txt -Force
        Set-Content $(Build.ArtifactStagingDirectory)/versioninfo.txt $(BuildNumberLong)

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact: local'
    inputs:
      PathtoPublish: $(Build.ArtifactStagingDirectory)
      ArtifactName: local
