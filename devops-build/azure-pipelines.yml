name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    include:
      - r*

variables:
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: pluginId
    value: 'grafana-octo-mesh-datasource'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}

stages:
  - stage: Build
    displayName: Build and Test
    jobs:
      - job: BuildAndTest
        displayName: Build Grafana Plugin
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: update-build-number.yml

          - checkout: self
            clean: true

          - template: set-version.yml

          - task: Bash@3
            displayName: Build plugin in Docker
            inputs:
              targetType: inline
              workingDirectory: $(Build.SourcesDirectory)
              script: |
                DOCKER_BUILDKIT=1 docker build \
                  -f devops-build/Dockerfile.build \
                  --build-arg VERSION=$(BuildNumberShort) \
                  --target output \
                  --output type=local,dest=./build-output \
                  .

          - task: CopyFiles@2
            displayName: Copy dist to staging
            inputs:
              SourceFolder: $(Build.SourcesDirectory)/build-output/dist
              Contents: '**/*'
              TargetFolder: $(Build.ArtifactStagingDirectory)/dist

          - task: PublishBuildArtifacts@1
            displayName: Publish build artifacts
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)
              ArtifactName: local

  - stage: Package
    displayName: Package Plugin
    dependsOn: Build
    jobs:
      - job: PackagePlugin
        displayName: Create Plugin Package
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: update-build-number.yml

          - checkout: self
            clean: true

          - task: DownloadPipelineArtifact@2
            displayName: Download build artifacts
            inputs:
              buildType: current
              artifactName: local
              targetPath: $(Pipeline.Workspace)/artifacts

          - task: CopyFiles@2
            displayName: Restore dist folder
            inputs:
              SourceFolder: $(Pipeline.Workspace)/artifacts/dist
              Contents: '**/*'
              TargetFolder: $(Build.SourcesDirectory)/dist

          - template: handle-artifacts.yml

  - stage: Deploy
    displayName: Deploy to test-2
    condition: and(succeeded(), eq(variables.isMain, true))
    dependsOn: Package
    jobs:
      - job: DeployTest2
        displayName: Rollout restart Grafana on test-2
        pool:
          name: meshmakers-ci-agents
        steps:
          - task: Kubernetes@1
            displayName: Restart Grafana deployment
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'meshmakers_k3s-test-2'
              namespace: 'grafana'
              command: 'rollout'
              arguments: 'restart deployment grafana'
