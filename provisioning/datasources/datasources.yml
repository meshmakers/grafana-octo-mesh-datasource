apiVersion: 1

datasources:
  - name: 'OctoMesh (Dev)'
    type: 'grafana-octo-mesh-datasource'
    url: 'https://host.docker.internal:5001'
    access: proxy
    isDefault: true
    orgId: 1
    version: 1
    editable: true
    jsonData:
      tenantId: 'meshtest'
      identityServerUrl: 'https://host.docker.internal:5003'
      oauthClientId: 'grafana-datasource'
      oauthScopes: 'openid profile email assetTenantAPI.full_access offline_access'
      tlsSkipVerify: true
